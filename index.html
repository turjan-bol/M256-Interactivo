<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Interactivo Módulo 256 | Economía</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-eco: #193152;
            --verde-eco: #98C72B;
            --verde-eco-dark: #7aa322;
            --sidebar-width: 340px;
            --bg-main: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        /* --- SIDEBAR RESPONSIVO --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--azul-eco);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            transition: var(--transition);
        }

        @media (max-width: 992px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 300px;
            }
            .sidebar.active {
                left: 0;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                backdrop-filter: blur(4px);
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

        .logo-box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            max-width: 120px;
            height: auto;
        }

        .search-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
        }

        .nav-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .nav-btn {
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #cbd5e1;
            text-align: left;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 4px;
            transition: var(--transition);
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); }
        .nav-btn.active {
            background-color: var(--verde-eco);
            color: var(--azul-eco);
            font-weight: 700;
        }

        .sidebar h2 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--verde-eco);
            margin: 1.2rem 0 0.5rem 0;
            padding-left: 5px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-bar {
            background: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .menu-toggle {
            display: none;
            background: var(--azul-eco);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
        }

        .title-group h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--azul-eco);
        }

        .title-group p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .info-alert {
            margin: 1rem;
            padding: 0.8rem 1rem;
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #0c4a6e;
        }

        /* --- VISUALIZADOR --- */
        .canvas-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
            background: #f1f5f9;
        }

        .viewer-card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        #plano-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .interactive-svg {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
        }

        .piso-path {
            fill: transparent;
            stroke: transparent;
            stroke-width: 2;
            cursor: pointer;
        }

        .piso-path:hover { fill: rgba(152, 199, 43, 0.2); stroke: var(--verde-eco); }
        .piso-path.active { fill: rgba(152, 199, 43, 0.4); stroke: var(--verde-eco); stroke-width: 2.5; }

        /* --- PANEL DE DETALLE RESPONSIVO --- */
        .detail-panel {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 360px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 1.5rem;
            z-index: 1100;
            border-top: 5px solid var(--verde-eco);
            transform: translateY(120%);
            transition: var(--transition);
        }

        @media (max-width: 768px) {
            .detail-panel {
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 20px 20px 0 0;
                padding-bottom: 2.5rem;
            }
        }

        .detail-panel.show { transform: translateY(0); }

        .detail-panel h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--azul-eco);
        }

        .detail-panel ul {
            list-style: none;
            max-height: 30vh;
            overflow-y: auto;
        }

        .detail-panel li {
            padding: 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }

        /* --- FOOTER --- */
        .footer {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 576px) {
            .footer { flex-direction: column; text-align: center; }
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* SEARCH RESULTS */
        .search-results {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            color: var(--text-main);
        }

        .result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .result-item:hover { background: #f8fafc; }
        .result-item small { display: block; color: var(--text-muted); font-size: 0.75rem; }

        .close-info {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/turjan-bol/M256-Interactivo/main/Logo%20Eco-03.png" alt="Logo Economía" class="logo-img">
        </div>

        <div class="search-container">
            <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" class="search-input" id="searchRoom" placeholder="Buscar..." oninput="handleSearch(this.value)">
            <div id="searchResults" class="search-results"></div>
        </div>

        <nav class="nav-list">
            <button class="nav-btn active" id="btn-exterior" onclick="selectPiso(0)">Vista Exterior</button>
            
            <h2>Planta Baja</h2>
            <button class="nav-btn" id="btn-docente" onclick="selectPiso('docente')">Atención al Docente</button>
            <button class="nav-btn" id="btn-direccion" onclick="selectPiso('direccion')">Dirección de Carrera</button>
            
            <h2>Niveles</h2>
            <button class="nav-btn" id="btn-p1" onclick="selectPiso('p1')">Piso 1: Auditorio</button>
            <button class="nav-btn" id="btn-p2" onclick="selectPiso('p2')">Piso 2: CITEF</button>
            <button class="nav-btn" id="btn-p3" onclick="selectPiso('p3')">Piso 3: Aulas 10-14</button>
            <button class="nav-btn" id="btn-p4" onclick="selectPiso('p4')">Piso 4: Aulas 15-19</button>
            <button class="nav-btn" id="btn-p5" onclick="selectPiso('p5')">Piso 5: Aulas 20-24</button>
        </nav>
    </aside>

    <main class="main">
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="title-group">
                <h1>Módulo 256: Economía</h1>
                <p>Facultad de Ciencias Económicas - UAGRM</p>
            </div>
        </header>

        <div class="info-alert">
            Haz clic en el plano o usa el buscador para encontrar un aula.
        </div>

        <div class="canvas-container">
            <div class="viewer-card">
                <img id="plano-img" src="https://raw.githubusercontent.com/turjan-bol/M256-Interactivo/main/plano256.png" alt="Módulo 256">
                <svg class="interactive-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                    <polygon id="poly-p5" class="piso-path" points="115,135 885,135 885,235 115,235" onclick="selectPiso('p5')" />
                    <polygon id="poly-p4" class="piso-path" points="115,240 885,240 885,340 115,340" onclick="selectPiso('p4')" />
                    <polygon id="poly-p3" class="piso-path" points="115,345 885,345 885,445 115,445" onclick="selectPiso('p3')" />
                    <polygon id="poly-p2" class="piso-path" points="75,465 925,465 955,545 45,545" onclick="selectPiso('p2')" />
                    <polygon id="poly-p1" class="piso-path" points="40,565 960,565 985,685 15,685" onclick="selectPiso('p1')" />
                    <polygon id="poly-docente" class="piso-path" points="85,745 455,745 455,895 85,895" onclick="selectPiso('docente')" />
                    <polygon id="poly-direccion" class="piso-path" points="475,745 855,745 855,895 475,895" onclick="selectPiso('direccion')" />
                </svg>
            </div>
        </div>

        <div id="infoPanel" class="detail-panel">
            <button class="close-info" onclick="selectPiso(0)">&times;</button>
            <h3 id="panelTitle">Piso</h3>
            <ul id="panelList"></ul>
        </div>

        <footer class="footer">
            <div class="contact-info">
                <p>Contacto: <strong>75411570</strong></p>
            </div>
            <a href="https://wa.me/59175411570" target="_blank" class="btn-whatsapp">
                WhatsApp
            </a>
        </footer>
    </main>

    <script>
        const infoData = {
            'docente': { title: "P.B.: Atención al Docente", items: ["Seguimiento Curricular", "Seguimiento a Graduados", "Sala de Docentes"] },
            'direccion': { title: "P.B.: Dirección de Carrera", items: ["Secretaría", "Actividades Extracurriculares", "Director: Lic. Waldo López"] },
            'p1': { title: "Piso 1: Auditorio y Cómputo", items: ["Auditorio 'Gustavo Prado'", "Sala de Cómputo", "Aulas 3 y 4", "Baños"] },
            'p2': { title: "Piso 2: CITEF", items: ["CITEF - Innovación Tecnológica"] },
            'p3': { title: "Piso 3: Aulas Académicas", items: ["Aula 10", "Aula 11", "Aula 12", "Aula 13", "Aula 14", "Baños"] },
            'p4': { title: "Piso 4: Laboratorios", items: ["Aula 15", "Aula 16", "Aula 17", "Aula 18", "Aula 19", "Baños"] },
            'p5': { title: "Piso 5: Postgrado", items: ["Aula 20", "Aula 21", "Aula 22", "Aula 23", "Aula 24", "Baños"] }
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function selectPiso(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.piso-path').forEach(p => p.classList.remove('active'));
            
            const panel = document.getElementById('infoPanel');
            if (id === 0) {
                panel.classList.remove('show');
                document.getElementById('btn-exterior').classList.add('active');
                return;
            }

            const btn = document.getElementById(`btn-${id}`);
            if(btn) btn.classList.add('active');
            const poly = document.getElementById(`poly-${id}`);
            if(poly) poly.classList.add('active');

            const data = infoData[id];
            document.getElementById('panelTitle').innerText = data.title;
            document.getElementById('panelList').innerHTML = data.items.map(i => `<li>${i}</li>`).join('');
            panel.classList.add('show');

            if(window.innerWidth < 992) {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }
        }

        function handleSearch(val) {
            const res = document.getElementById('searchResults');
            if(!val || val.length < 2) { res.style.display = 'none'; return; }
            const q = val.toLowerCase();
            const matches = [];
            for(const [id, d] of Object.entries(infoData)) {
                const found = d.items.find(i => i.toLowerCase().includes(q)) || d.title.toLowerCase().includes(q);
                if(found) matches.push({id, label: typeof found === 'string' ? found : d.title, piso: d.title});
            }
            if(matches.length > 0) {
                res.innerHTML = matches.map(m => `<div class="result-item" onclick="selectFromSearch('${m.id}')"><strong>${m.label}</strong><small>${m.piso}</small></div>`).join('');
                res.style.display = 'block';
            } else { res.style.display = 'none'; }
        }

        function selectFromSearch(id) {
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchRoom').value = '';
            selectPiso(id);
        }

        window.onload = () => selectPiso(0);
    </script>
</body>
</html>
